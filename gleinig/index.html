<!DOCTYPE html>
<html class="staticrypt-html" lang="de">
    <head>
        <meta charset="utf-8" />
        <title>Client Portal</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="robots" content="noindex, nofollow" />
        <meta http-equiv="cache-control" content="max-age=0" />
        <meta http-equiv="cache-control" content="no-cache" />
        <meta http-equiv="expires" content="0" />
        <meta http-equiv="expires" content="Tue, 01 Jan 1980 1:00:00 GMT" />
        <meta http-equiv="pragma" content="no-cache" />
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Azeret+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
        <style>
            :root {
                /* Fluid Typography (Lumos-System analog starks-design-system/core.css) */
                --size-unit: 16;
                --size-container-ideal: 1920;
                --size-container-min: 992px;
                --size-container-max: 2540px;
                --size-container: clamp(var(--size-container-min), 100vw, var(--size-container-max));
                --size-font: max(15px, calc(var(--size-container) / (var(--size-container-ideal) / var(--size-unit))));

                --bg-00: #0D0B0B;
                --bg-03: color-mix(in srgb, #F1EBE5 3%, #0D0B0B);
                --bg-05: color-mix(in srgb, #F1EBE5 5%, #0D0B0B);
                --bg-10: color-mix(in srgb, #F1EBE5 10%, #0D0B0B);
                --fg: #F1EBE5;
                --fg-muted: color-mix(in srgb, #F1EBE5 55%, transparent);
                --fg-faded: color-mix(in srgb, #F1EBE5 28%, transparent);
                --border: color-mix(in srgb, #F1EBE5 12%, transparent);
                --brand: #5E2436;
                --brand-soft: color-mix(in srgb, #5E2436 15%, transparent);
                --accent: #5E2436;
                --success: #2ECC71;
                --ease-starks: cubic-bezier(0.625, 0.05, 0, 1);
                --radius-sm: 0.5em;
                --radius-md: 0.75em;
                --radius-lg: 1em;
                --radius-round: 100vw;
                --font-primary: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
                --font-secondary: 'Azeret Mono', ui-monospace, monospace;
            }

            * { margin: 0; padding: 0; box-sizing: border-box; }
            html, body { height: 100%; }
            html { scrollbar-width: none; }
            body::-webkit-scrollbar { display: none; }

            .staticrypt-body {
                font-family: var(--font-primary);
                font-size: var(--size-font);
                background: var(--bg-00);
                color: var(--fg);
                -webkit-font-smoothing: antialiased;
                overflow-x: hidden;
            }

            /* Haupt-Content */
            .staticrypt-content {
                position: relative;
                z-index: 1;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: space-between;
                padding: 3em 1.5em 2em;
            }

            /* Oben: Logo + Heading + Card */
            .staticrypt-main {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                flex: 1;
                width: 100%;
                max-width: 32em;
                gap: 2em;
            }

            /* Triangle Logo — clean weiss, zentriert oben */
            .staticrypt-logo svg {
                width: 4.5em;
                height: auto;
                fill: var(--fg);
                opacity: 0.95;
                transition: transform 0.4s var(--ease-starks);
            }
            .staticrypt-logo:hover svg {
                transform: translateY(-4px);
            }

            /* Heading-Gruppe */
            .staticrypt-heading {
                text-align: center;
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 0.75em;
            }
            .eyebrow {
                font-family: var(--font-secondary);
                font-size: 0.75em;
                font-weight: 600;
                letter-spacing: 0.12em;
                text-transform: uppercase;
                color: var(--fg-muted);
            }
            .staticrypt-title {
                font-family: var(--font-primary);
                font-size: 2.25em;
                font-weight: 700;
                line-height: 1.1;
                letter-spacing: -0.02em;
                color: var(--fg);
            }
            .staticrypt-instructions {
                font-size: 1em;
                font-weight: 400;
                line-height: 1.55;
                color: var(--fg-muted);
                max-width: 28em;
            }
            .accent-line {
                width: 3em;
                height: 2px;
                background: var(--brand);
                margin-top: 0.5em;
                border-radius: 2px;
            }

            .staticrypt-hr { display: none; }

            /* Form-Card */
            .staticrypt-form {
                width: 100%;
                background: color-mix(in srgb, var(--bg-00) 70%, transparent);
                border: 1px solid var(--border);
                border-radius: var(--radius-lg);
                padding: 2em;
                backdrop-filter: blur(20px);
                -webkit-backdrop-filter: blur(20px);
                display: flex;
                flex-direction: column;
                gap: 1em;
            }

            /* Password-Feld */
            .staticrypt-password-container {
                position: relative;
                background: var(--bg-05);
                border: 1px solid var(--border);
                border-radius: var(--radius-md);
                transition: border-color 0.2s var(--ease-starks), background 0.2s var(--ease-starks);
            }
            .staticrypt-password-container:focus-within {
                border-color: var(--brand);
                background: var(--bg-10);
            }

            .staticrypt-form input[type="password"],
            .staticrypt-form input[type="text"] {
                background: transparent;
                border: 0;
                font-family: var(--font-primary);
                font-size: 1em;
                color: var(--fg);
                outline: 0;
                padding: 1em 3em 1em 1.25em;
                width: 100%;
            }
            .staticrypt-form input::placeholder { color: var(--fg-faded); }

            .staticrypt-toggle-password-visibility {
                cursor: pointer;
                height: 1.1em;
                width: 1.1em;
                opacity: 0.35;
                padding: 0.85em;
                position: absolute;
                right: 0.3em;
                top: 50%;
                transform: translateY(-50%);
                filter: invert(1);
                transition: opacity 0.2s var(--ease-starks);
                box-sizing: content-box;
            }
            .staticrypt-toggle-password-visibility:hover { opacity: 0.7; }

            /* Remember Me */
            label.staticrypt-remember {
                display: flex;
                align-items: center;
                font-family: var(--font-secondary);
                font-size: 0.8em;
                letter-spacing: 0.02em;
                color: var(--fg-muted);
                cursor: pointer;
                user-select: none;
            }
            .staticrypt-remember input[type="checkbox"] {
                width: 1em;
                height: 1em;
                margin-right: 0.75em;
                accent-color: var(--brand);
                cursor: pointer;
            }

            /* Decrypt Button — Brand-Lila */
            .staticrypt-form .staticrypt-decrypt-button {
                font-family: var(--font-primary);
                font-size: 0.95em;
                font-weight: 700;
                letter-spacing: 0.06em;
                text-transform: uppercase;
                outline: 0;
                background: var(--brand);
                width: 100%;
                border: 0;
                padding: 1.05em;
                color: #ffffff;
                border-radius: var(--radius-md);
                cursor: pointer;
                transition: background 0.2s var(--ease-starks), transform 0.1s var(--ease-starks), box-shadow 0.2s var(--ease-starks);
                box-shadow: 0 0 0 0 var(--brand-soft);
            }
            .staticrypt-form .staticrypt-decrypt-button:hover {
                background: color-mix(in srgb, var(--brand) 85%, white);
                box-shadow: 0 8px 24px -8px var(--brand-soft);
            }
            .staticrypt-form .staticrypt-decrypt-button:active {
                transform: scale(0.98);
            }

            /* Divider — volle Breite bis zum Content-Padding */
            .section-divider {
                width: 100%;
                border-top: 1px solid var(--border);
                margin: 2em 0 1.5em;
            }

            /* Kontakt-Block */
            .staticrypt-contact {
                width: 100%;
                max-width: 32em;
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 0.5em;
                text-align: center;
            }
            .staticrypt-contact .eyebrow {
                margin-bottom: 0.5em;
            }
            .staticrypt-contact .contact-name {
                font-size: 1.1em;
                font-weight: 600;
                color: var(--fg);
                letter-spacing: -0.01em;
            }
            .staticrypt-contact .contact-role {
                font-size: 0.85em;
                color: var(--fg-muted);
                margin-bottom: 0.75em;
            }
            .staticrypt-contact .contact-rows {
                display: flex;
                flex-wrap: wrap;
                justify-content: center;
                gap: 0.4em 1.5em;
                font-family: var(--font-secondary);
                font-size: 0.8em;
                color: var(--fg-muted);
            }
            .staticrypt-contact .contact-rows a {
                color: var(--fg-muted);
                text-decoration: none;
                transition: color 0.2s var(--ease-starks);
            }
            .staticrypt-contact .contact-rows a:hover { color: var(--fg); }

            /* Footer — nur Logotype, keine Text-Wiederholungen */
            .staticrypt-footer {
                width: 100%;
                display: flex;
                flex-direction: column;
                align-items: center;
                margin-top: 1.5em;
                opacity: 0.85;
            }
            .logotype {
                font-family: var(--font-primary);
                font-style: italic;
                font-size: 1.1em;
                letter-spacing: -0.03em;
                color: var(--fg);
                display: inline-flex;
                align-items: baseline;
                white-space: nowrap;
            }
            .logotype strong { font-weight: 900; font-style: italic; }
            .logotype span { font-weight: 400; font-style: italic; letter-spacing: -0.06em; }

            /* Hidden-Utility */
            .hidden { display: none !important; }

            /* Spinner */
            .staticrypt-spinner-container {
                height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                background: var(--bg-00);
                position: relative;
                z-index: 2;
            }
            .staticrypt-spinner {
                display: inline-block;
                width: 2.25rem;
                height: 2.25rem;
                border: 2px solid var(--border);
                border-right-color: var(--brand);
                border-radius: 50%;
                animation: spinner-border 0.75s linear infinite;
            }
            @keyframes spinner-border { 100% { transform: rotate(360deg); } }

            /* Entry-Animation */
            @keyframes entry-fade {
                from { opacity: 0; transform: translateY(14px); }
                to { opacity: 1; transform: translateY(0); }
            }
            .staticrypt-content > * { animation: entry-fade 0.55s var(--ease-starks) both; }
            .staticrypt-content > *:nth-child(1) { animation-delay: 0.05s; }
            .staticrypt-content > *:nth-child(2) { animation-delay: 0.15s; }
            .staticrypt-content > *:nth-child(3) { animation-delay: 0.25s; }

            /* Mobile */
            @media (max-width: 560px) {
                .staticrypt-content { padding: 2em 1em 1.5em; }
                .staticrypt-title { font-size: 1.75em; }
                .staticrypt-form { padding: 1.5em; }
            }
            @media (prefers-reduced-motion: reduce) {
                .staticrypt-content > * { animation: none; }
                .staticrypt-logo svg { transition: none; }
            }
        </style>
    </head>

            const staticryptInitiator = ((function(){
  const exports = {};
  const cryptoEngine = ((function(){
  const exports = {};
  const { subtle } = crypto;

const IV_BITS = 16 * 8;
const HEX_BITS = 4;
const ENCRYPTION_ALGO = "AES-CBC";

/**
 * Translates between utf8 encoded hexadecimal strings
 * and Uint8Array bytes.
 */
const HexEncoder = {
    /**
     * hex string -> bytes
     * @param {string} hexString
     * @returns {Uint8Array}
     */
    parse: function (hexString) {
        if (hexString.length % 2 !== 0) throw "Invalid hexString";
        const arrayBuffer = new Uint8Array(hexString.length / 2);

        for (let i = 0; i < hexString.length; i += 2) {
            const byteValue = parseInt(hexString.substring(i, i + 2), 16);
            if (isNaN(byteValue)) {
                throw "Invalid hexString";
            }
            arrayBuffer[i / 2] = byteValue;
        }
        return arrayBuffer;
    },

    /**
     * bytes -> hex string
     * @param {Uint8Array} bytes
     * @returns {string}
     */
    stringify: function (bytes) {
        const hexBytes = [];

        for (let i = 0; i < bytes.length; ++i) {
            let byteString = bytes[i].toString(16);
            if (byteString.length < 2) {
                byteString = "0" + byteString;
            }
            hexBytes.push(byteString);
        }
        return hexBytes.join("");
    },
};

/**
 * Translates between utf8 strings and Uint8Array bytes.
 */
const UTF8Encoder = {
    parse: function (str) {
        return new TextEncoder().encode(str);
    },

    stringify: function (bytes) {
        return new TextDecoder().decode(bytes);
    },
};

/**
 * Salt and encrypt a msg with a password.
 */
async function encrypt(msg, hashedPassword) {
    // Must be 16 bytes, unpredictable, and preferably cryptographically random. However, it need not be secret.
    // https://developer.mozilla.org/en-US/docs/Web/API/SubtleCrypto/encrypt#parameters
    const iv = crypto.getRandomValues(new Uint8Array(IV_BITS / 8));

    const key = await subtle.importKey("raw", HexEncoder.parse(hashedPassword), ENCRYPTION_ALGO, false, ["encrypt"]);

    const encrypted = await subtle.encrypt(
        {
            name: ENCRYPTION_ALGO,
            iv: iv,
        },
        key,
        UTF8Encoder.parse(msg)
    );

    // iv will be 32 hex characters, we prepend it to the ciphertext for use in decryption
    return HexEncoder.stringify(iv) + HexEncoder.stringify(new Uint8Array(encrypted));
}
exports.encrypt = encrypt;

/**
 * Decrypt a salted msg using a password.
 *
 * @param {string} encryptedMsg
 * @param {string} hashedPassword
 * @returns {Promise<string>}
 */
async function decrypt(encryptedMsg, hashedPassword) {
    const ivLength = IV_BITS / HEX_BITS;
    const iv = HexEncoder.parse(encryptedMsg.substring(0, ivLength));
    const encrypted = encryptedMsg.substring(ivLength);

    const key = await subtle.importKey("raw", HexEncoder.parse(hashedPassword), ENCRYPTION_ALGO, false, ["decrypt"]);

    const outBuffer = await subtle.decrypt(
        {
            name: ENCRYPTION_ALGO,
            iv: iv,
        },
        key,
        HexEncoder.parse(encrypted)
    );

    return UTF8Encoder.stringify(new Uint8Array(outBuffer));
}
exports.decrypt = decrypt;

/**
 * Salt and hash the password so it can be stored in localStorage without opening a password reuse vulnerability.
 *
 * @param {string} password
 * @param {string} salt
 * @returns {Promise<string>}
 */
async function hashPassword(password, salt) {
    // we hash the password in multiple steps, each adding more iterations. This is because we used to allow less
    // iterations, so for backward compatibility reasons, we need to support going from that to more iterations.
    let hashedPassword = await hashLegacyRound(password, salt);

    hashedPassword = await hashSecondRound(hashedPassword, salt);

    return hashThirdRound(hashedPassword, salt);

exports.hashPassword = hashPassword;

/**
 * This hashes the password with 1k iterations. This is a low number, we need this function to support backwards
 * compatibility.
 *
 * @param {string} password
 * @param {string} salt
 * @returns {Promise<string>}
 */
function hashLegacyRound(password, salt) {
    return pbkdf2(password, salt, 1000, "SHA-1");
}
exports.hashLegacyRound = hashLegacyRound;

/**
 * Add a second round of iterations. This is because we used to use 1k, so for backwards compatibility with
 * remember-me/autodecrypt links, we need to support going from that to more iterations.
 *
 * @param hashedPassword
 * @param salt
 * @returns {Promise<string>}
 */
function hashSecondRound(hashedPassword, salt) {
    return pbkdf2(hashedPassword, salt, 14000, "SHA-256");
}
exports.hashSecondRound = hashSecondRound;

/**
 * Add a third round of iterations to bring total number to 600k. This is because we used to use 1k, then 15k, so for
 * backwards compatibility with remember-me/autodecrypt links, we need to support going from that to more iterations.
 *
 * @param hashedPassword
 * @param salt
 * @returns {Promise<string>}
 */
function hashThirdRound(hashedPassword, salt) {
    return pbkdf2(hashedPassword, salt, 585000, "SHA-256");
}
exports.hashThirdRound = hashThirdRound;

/**
 * Salt and hash the password so it can be stored in localStorage without opening a password reuse vulnerability.
 *
 * @param {string} password
 * @param {string} salt
 * @param {int} iterations
 * @param {string} hashAlgorithm
 * @returns {Promise<string>}
 */
async function pbkdf2(password, salt, iterations, hashAlgorithm) {
    const key = await subtle.importKey("raw", UTF8Encoder.parse(password), "PBKDF2", false, ["deriveBits"]);

    const keyBytes = await subtle.deriveBits(
        {
            name: "PBKDF2",
            hash: hashAlgorithm,
            iterations,
            salt: UTF8Encoder.parse(salt),
        },
        key,
        256
    );

    return HexEncoder.stringify(new Uint8Array(keyBytes));
}

function generateRandomSalt() {
    const bytes = crypto.getRandomValues(new Uint8Array(128 / 8));

    return HexEncoder.stringify(new Uint8Array(bytes));
}
exports.generateRandomSalt = generateRandomSalt;

async function signMessage(hashedPassword, message) {
    const key = await subtle.importKey(
        "raw",
        HexEncoder.parse(hashedPassword),
        {
            name: "HMAC",
            hash: "SHA-256",
        },
        false,
        ["sign"]
    );
    const signature = await subtle.sign("HMAC", key, UTF8Encoder.parse(message));

    return HexEncoder.stringify(new Uint8Array(signature));
}
exports.signMessage = signMessage;

function getRandomAlphanum() {
    const possibleCharacters = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";

    let byteArray;
    let parsedInt;

    // Keep generating new random bytes until we get a value that falls
    // within a range that can be evenly divided by possibleCharacters.length
    do {
        byteArray = crypto.getRandomValues(new Uint8Array(1));
        // extract the lowest byte to get an int from 0 to 255 (probably unnecessary, since we're only generating 1 byte)
        parsedInt = byteArray[0] & 0xff;
    } while (parsedInt >= 256 - (256 % possibleCharacters.length));

    // Take the modulo of the parsed integer to get a random number between 0 and totalLength - 1
    const randomIndex = parsedInt % possibleCharacters.length;

    return possibleCharacters[randomIndex];
}

/**
 * Generate a random string of a given length.
 *
 * @param {int} length
 * @returns {string}
 */
function generateRandomString(length) {
