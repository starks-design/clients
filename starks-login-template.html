            .staticrypt-page {

            .staticrypt-title {

                font-weight: 600;
                color: #F1EBE5;
                margin-bottom: 4px;

            .staticrypt-instructions {
                font-size: 14px;
                color: rgba(241, 235, 229, 0.5);
                margin-bottom: 32px;
                line-height: 1.5;
            }

            .staticrypt-hr { display: none; }

            .staticrypt-password-container {
                position: relative;
                background: rgba(241, 235, 229, 0.06);
                border: 1px solid rgba(241, 235, 229, 0.12);
                border-radius: 10px;
                margin-bottom: 16px;
                transition: border-color 0.2s;
            }
            .staticrypt-password-container:focus-within {
                border-color: #E8632B;
            }

            .staticrypt-form input[type="password"],
            .staticrypt-form input[type="text"] {
                background: transparent;
                border: 0;
                font-family: 'Inter', sans-serif;
                font-size: 15px;
                color: #F1EBE5;
                outline: 0;
                padding: 14px 44px 14px 16px;
                width: 100%;
                box-sizing: border-box;
            }
            .staticrypt-form input::placeholder {
                color: rgba(241, 235, 229, 0.3);
            }

            .staticrypt-toggle-password-visibility {
                cursor: pointer;
                height: 18px;
                width: 18px;
                opacity: 0.3;
                padding: 12px;
                position: absolute;
                right: 4px;
                top: 50%;
                transform: translateY(-50%);
                filter: invert(1);
                transition: opacity 0.2s;
            }
            .staticrypt-toggle-password-visibility:hover {
                opacity: 0.6;
            }

            .staticrypt-form .staticrypt-decrypt-button {
                font-family: 'Inter', sans-serif;
                text-transform: none;
                letter-spacing: 0.02em;
                outline: 0;
                background: #E8632B;
                width: 100%;
                border: 0;
                padding: 14px;
                color: #F1EBE5;
                font-size: 15px;
                font-weight: 600;
                border-radius: 10px;
                cursor: pointer;
                transition: background 0.2s, transform 0.1s;
            }
            .staticrypt-form .staticrypt-decrypt-button:hover {
                background: #d4571f;
                filter: none;
            }
            .staticrypt-form .staticrypt-decrypt-button:active {
                transform: scale(0.98);
                filter: none;
            }

            label.staticrypt-remember {
                display: flex;
                align-items: center;
                margin-bottom: 20px;
                font-size: 13px;
                color: rgba(241, 235, 229, 0.5);
                cursor: pointer;
            }
            .staticrypt-remember input[type="checkbox"] {
                transform: scale(1.2);
                margin-right: 10px;
                accent-color: #E8632B;
            }

            .hidden { display: none !important; }

            .staticrypt-spinner-container {
                height: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
                background: #0D0B0B;
            }
            .staticrypt-spinner {
                display: inline-block;
                width: 2rem;
                height: 2rem;
                border: 2px solid rgba(241, 235, 229, 0.15);
                border-right-color: #E8632B;
                border-radius: 50%;
                animation: spinner-border 0.75s linear infinite;
            }
            @keyframes spinner-border {
                100% { transform: rotate(360deg); }
            }

            .staticrypt-footer {
                margin-top: 24px;
                text-align: center;
                font-size: 12px;
                color: rgba(241, 235, 229, 0.2);
