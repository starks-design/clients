<html class="staticrypt-html" lang="de">
    <head>
        <meta charset="utf-8" />
        <title>/*[|template_title|]*/0</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="robots" content="noindex, nofollow" />
        <meta http-equiv="cache-control" content="max-age=0" />
        <meta http-equiv="cache-control" content="no-cache" />
        <meta http-equiv="expires" content="0" />
        <meta http-equiv="expires" content="Tue, 01 Jan 1980 1:00:00 GMT" />
        <meta http-equiv="pragma" content="no-cache" />
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Azeret+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
        <style>
            :root {
                /* Fluid Typography (Lumos-System analog starks-design-system/core.css) */
                --size-unit: 16;
                --size-container-ideal: 1920;
                --size-container-min: 992px;
                --size-container-max: 2540px;
                --size-container: clamp(var(--size-container-min), 100vw, var(--size-container-max));
                --size-font: max(15px, calc(var(--size-container) / (var(--size-container-ideal) / var(--size-unit))));

                --bg-00: #0D0B0B;
                --bg-03: color-mix(in srgb, #F1EBE5 3%, #0D0B0B);
                --bg-05: color-mix(in srgb, #F1EBE5 5%, #0D0B0B);
                --bg-10: color-mix(in srgb, #F1EBE5 10%, #0D0B0B);
                --fg: #F1EBE5;
                --fg-muted: color-mix(in srgb, #F1EBE5 55%, transparent);
                --fg-faded: color-mix(in srgb, #F1EBE5 28%, transparent);
                --border: color-mix(in srgb, #F1EBE5 12%, transparent);
                --brand: #5E2436;
                --brand-soft: color-mix(in srgb, #5E2436 15%, transparent);
                --accent: #E8632B;
                --success: #2ECC71;
                --ease-starks: cubic-bezier(0.625, 0.05, 0, 1);
                --radius-sm: 0.5em;
                --radius-md: 0.75em;
                --radius-lg: 1em;
                --radius-round: 100vw;
                --font-primary: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
                --font-secondary: 'Azeret Mono', ui-monospace, monospace;
            }

            * { margin: 0; padding: 0; box-sizing: border-box; }
            html, body { height: 100%; }
            html { scrollbar-width: none; }
            body::-webkit-scrollbar { display: none; }

            .staticrypt-body {
                font-family: var(--font-primary);
                font-size: var(--size-font);
                background: var(--bg-00);
                color: var(--fg);
                -webkit-font-smoothing: antialiased;
                overflow-x: hidden;
            }

            /* Haupt-Content */
            .staticrypt-content {
                position: relative;
                z-index: 1;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: space-between;
                padding: 3em 1.5em 2em;
            }

            /* Oben: Logo + Heading + Card */
            .staticrypt-main {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                flex: 1;
                width: 100%;
                max-width: 32em;
                gap: 2em;
            }

            /* Triangle Logo — clean weiss, zentriert oben */
            .staticrypt-logo svg {
                width: 4.5em;
                height: auto;
                fill: var(--fg);
                opacity: 0.95;
                transition: transform 0.4s var(--ease-starks);
            }
            .staticrypt-logo:hover svg {
                transform: translateY(-4px);
            }

            /* Heading-Gruppe */
            .staticrypt-heading {
                text-align: center;
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 0.75em;
            }
            .eyebrow {
                font-family: var(--font-secondary);
                font-size: 0.75em;
                font-weight: 600;
                letter-spacing: 0.12em;
                text-transform: uppercase;
                color: var(--fg-muted);
            }
            .staticrypt-title {
                font-family: var(--font-primary);
                font-size: 2.25em;
                font-weight: 700;
                line-height: 1.1;
                letter-spacing: -0.02em;
                color: var(--fg);
            }
            .staticrypt-instructions {
                font-size: 1em;
                font-weight: 400;
                line-height: 1.55;
                color: var(--fg-muted);
                max-width: 28em;
            }
            .accent-line {
                width: 3em;
                height: 2px;
                background: var(--brand);
                margin-top: 0.5em;
                border-radius: 2px;
            }

            .staticrypt-hr { display: none; }

            /* Form-Card */
            .staticrypt-form {
                width: 100%;
                background: color-mix(in srgb, var(--bg-00) 70%, transparent);
                border: 1px solid var(--border);
                border-radius: var(--radius-lg);
                padding: 2em;
                backdrop-filter: blur(20px);
                -webkit-backdrop-filter: blur(20px);
                display: flex;
                flex-direction: column;
                gap: 1em;
            }

            /* Password-Feld */
            .staticrypt-password-container {
                position: relative;
                background: var(--bg-05);
                border: 1px solid var(--border);
                border-radius: var(--radius-md);
                transition: border-color 0.2s var(--ease-starks), background 0.2s var(--ease-starks);
            }
            .staticrypt-password-container:focus-within {
                border-color: var(--brand);
                background: var(--bg-10);
            }

            .staticrypt-form input[type="password"],
            .staticrypt-form input[type="text"] {
                background: transparent;
                border: 0;
                font-family: var(--font-primary);
                font-size: 1em;
                color: var(--fg);
                outline: 0;
                padding: 1em 3em 1em 1.25em;
                width: 100%;
            }
            .staticrypt-form input::placeholder { color: var(--fg-faded); }

            .staticrypt-toggle-password-visibility {
                cursor: pointer;
                height: 1.1em;
                width: 1.1em;
                opacity: 0.35;
                padding: 0.85em;
                position: absolute;
                right: 0.3em;
                top: 50%;
                transform: translateY(-50%);
                filter: invert(1);
                transition: opacity 0.2s var(--ease-starks);
                box-sizing: content-box;
            }
            .staticrypt-toggle-password-visibility:hover { opacity: 0.7; }

            /* Remember Me */
            label.staticrypt-remember {
                display: flex;
                align-items: center;
                font-family: var(--font-secondary);
                font-size: 0.8em;
                letter-spacing: 0.02em;
                color: var(--fg-muted);
                cursor: pointer;
                user-select: none;
            }
            .staticrypt-remember input[type="checkbox"] {
                width: 1em;
                height: 1em;
                margin-right: 0.75em;
                accent-color: var(--brand);
                cursor: pointer;
            }

            /* Decrypt Button — Brand-Lila */
            .staticrypt-form .staticrypt-decrypt-button {
                font-family: var(--font-primary);
                font-size: 0.95em;
                font-weight: 700;
                letter-spacing: 0.06em;
                text-transform: uppercase;
                outline: 0;
                background: var(--brand);
                width: 100%;
                border: 0;
                padding: 1.05em;
                color: #ffffff;
                border-radius: var(--radius-md);
                cursor: pointer;
                transition: background 0.2s var(--ease-starks), transform 0.1s var(--ease-starks), box-shadow 0.2s var(--ease-starks);
                box-shadow: 0 0 0 0 var(--brand-soft);
            }
            .staticrypt-form .staticrypt-decrypt-button:hover {
                background: color-mix(in srgb, var(--brand) 85%, white);
                box-shadow: 0 8px 24px -8px var(--brand-soft);
            }
            .staticrypt-form .staticrypt-decrypt-button:active {
                transform: scale(0.98);
            }

            /* Divider — volle Breite bis zum Content-Padding */
            .section-divider {
                width: 100%;
                border-top: 1px solid var(--border);
                margin: 2em 0 1.5em;
            }

            /* Kontakt-Block */
            .staticrypt-contact {
                width: 100%;
                max-width: 32em;
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 0.5em;
                text-align: center;
            }
            .staticrypt-contact .eyebrow {
                margin-bottom: 0.5em;
            }
            .staticrypt-contact .contact-name {
                font-size: 1.1em;
                font-weight: 600;
                color: var(--fg);
                letter-spacing: -0.01em;
            }
            .staticrypt-contact .contact-role {
                font-size: 0.85em;
                color: var(--fg-muted);
                margin-bottom: 0.75em;
            }
            .staticrypt-contact .contact-rows {
                display: flex;
                flex-wrap: wrap;
                justify-content: center;
                gap: 0.4em 1.5em;
                font-family: var(--font-secondary);
                font-size: 0.8em;
                color: var(--fg-muted);
            }
            .staticrypt-contact .contact-rows a {
                color: var(--fg-muted);
                text-decoration: none;
                transition: color 0.2s var(--ease-starks);
            }
            .staticrypt-contact .contact-rows a:hover { color: var(--fg); }

            /* Footer — nur Logotype, keine Text-Wiederholungen */
            .staticrypt-footer {
                width: 100%;
                display: flex;
                flex-direction: column;
                align-items: center;
                margin-top: 1.5em;
                opacity: 0.85;
            }
            .logotype {
                font-family: var(--font-primary);
                font-style: italic;
                font-size: 1.1em;
                letter-spacing: -0.03em;
                color: var(--fg);
                display: inline-flex;
                align-items: baseline;
                white-space: nowrap;
            }
            .logotype strong { font-weight: 900; font-style: italic; }
            .logotype span { font-weight: 400; font-style: italic; letter-spacing: -0.06em; }

            /* Hidden-Utility */
            .hidden { display: none !important; }

            /* Spinner */
            .staticrypt-spinner-container {
                height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                background: var(--bg-00);
                position: relative;
                z-index: 2;
            }
            .staticrypt-spinner {
                display: inline-block;
                width: 2.25rem;
                height: 2.25rem;
                border: 2px solid var(--border);
                border-right-color: var(--brand);
                border-radius: 50%;
                animation: spinner-border 0.75s linear infinite;
            }
            @keyframes spinner-border { 100% { transform: rotate(360deg); } }

            /* Entry-Animation */
            @keyframes entry-fade {
                from { opacity: 0; transform: translateY(14px); }
                to { opacity: 1; transform: translateY(0); }
            }
            .staticrypt-content > * { animation: entry-fade 0.55s var(--ease-starks) both; }
            .staticrypt-content > *:nth-child(1) { animation-delay: 0.05s; }
            .staticrypt-content > *:nth-child(2) { animation-delay: 0.15s; }
            .staticrypt-content > *:nth-child(3) { animation-delay: 0.25s; }

            /* Mobile */
            @media (max-width: 560px) {
                .staticrypt-content { padding: 2em 1em 1.5em; }
                .staticrypt-title { font-size: 1.75em; }
                .staticrypt-form { padding: 1.5em; }
            }
            @media (prefers-reduced-motion: reduce) {
                .staticrypt-content > * { animation: none; }
                .staticrypt-logo svg { transition: none; }
            }
        </style>
    </head>

                isRememberEnabled = /*[|is_remember_enabled|]*/ 0,

            const templateConfig = {
                rememberExpirationKey: "staticrypt_expiration",
                rememberPassphraseKey: "staticrypt_passphrase",
                replaceHtmlCallback: null,
                clearLocalStorageCallback: null,

            const staticrypt = staticryptInitiator.init(staticryptConfig, templateConfig);

            // Title-Zeilenumbruch: " – " oder " — " splittet in 2 Zeilen
            (function () {
                const titleEl = document.getElementById("staticryptTitle");
                if (!titleEl) return;
                const parts = titleEl.textContent.split(/\s+[–—-]\s+/);
                if (parts.length >= 2) {
                    titleEl.innerHTML = parts.map(p => `<span class="title-line">${p.trim()}</span>`).join("<br>");
                }
            })();

            window.onload = async function () {
                const { isSuccessful } = await staticrypt.handleDecryptOnLoad();
                if (!isSuccessful) {
                    document.getElementById("staticrypt_loading").classList.add("hidden");
                    document.getElementById("staticrypt_content").classList.remove("hidden");
                    document.getElementById("staticrypt-password").focus();
                    if (isRememberEnabled) {
                        document.getElementById("staticrypt-remember-label").classList.remove("hidden");
                    }

                const passwordInput = document.getElementById("staticrypt-password");

                    passwordInput.type = "text";
                    toggleIcon.src = imgSrcEyeOpened;
                    toggleIcon.alt = templateToggleAltHide;

                    passwordInput.type = "password";
